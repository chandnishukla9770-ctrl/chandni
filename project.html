<html lang="en">
<head>

    <title>Document</title>
    <script>
        let myInt;
        let x = 100;
        let dir = 3;

        function move(){
            x = x + 3*dir;
            document.getElementById("ball").style.left = x + "px";
            if (x > 1100) dir = -1;                   
            if (x < 100) dir = 1; 
        }

        function Start(){
           myInt =  setInterval(move, 30);
        }

        function mystop(){
            clearTimeout(myInt)
        }

</head>
<body>
