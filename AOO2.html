<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            border: 1px solid black;
            padding: 10px;
            margin: 10px;
            width: 150px;
            
        }
    </style>
</head>
<body>
<div id="result" style="display: flex;">
    



    <script>
// AOO method --
let AOO=[{
    name:'sid',
    age:26,
    city:'bhopal'

}, {
    name:'shiv',
    age:23,
    city:'indore'
}, {
    name:'Alex',
    age:25,
    city:'ujjain'
}]
let output = "";

AOO.map((e)=>{
    output+= `
    <div class="box">
       <h3>Name: ${e.name}</h3>
       <p>age: ${e.age}</p>
       <p>city: ${e.city}</p>
    
    </div>
    `;
});

document.querySelector("#result").innerHTML=output;




    </script>
    
</body>
</html>
