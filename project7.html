<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Live Form validation.</title>

    <style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f4f4;
}

.form-box{
    width: 500px;
    margin: 100px auto;
    padding: 20px;
    background: white;
    box-shadow: 0 0 10px grey;
}
input{
    width: 90%;
    padding: 8px;
    margin-top: 10px;
}

p{
    color: red;
    font-size: 12px;
}

button{
    width: 100%;
    margin-top: 15px;
    padding: 10px;
    background: green;
    color: white;
    border: none;
}


    </style>
</head>
<body>
    <form onsubmit="return formValid()">
  <div class="form-box">
<h2>Register</h2>


 <p id="errname"></p> 
 Enter name <input type="text" id="name" placeholder="Enter Name">
<br><br>
<p id="errnum"></p>
Enter number <input type="number" id="num" placeholder="Enter Number">
<br><br>
<p id="erremail"></p>
Enter email <input type="text" id="email"  placeholder="Enter an Email">
<br><br>
<p id="errpass"></p>
Enter password <input type="text" id="pass" placeholder="Enter password">
<br><br>
<p id="errcpass"></p>
Enter CPass <input type="text" id="cpass" placeholder="Enter confirm password">
<br><br>

<button type="submit">Submit</button>
</div>
</form>

    <script src="project7.js"></script>
</body>
</html>
